<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Forecast</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: Arial, sans-serif; background-color: #1a73e8; color: #fff; overflow: hidden; }

    .page { height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 40px 16px; }

    h1   { font-size: 1.6rem; margin-bottom: 4px; }
    h1 i { margin-right: 10px; }
    p.sub { opacity: 0.8; margin-bottom: 20px; font-size: 0.9rem; }

    /* search bar and button sit side by side */
    .search-box { display: flex; gap: 10px; width: 100%; max-width: 480px; margin-bottom: 20px; }
    input { flex: 1; padding: 10px 16px; border: none; font-size: 1rem; outline: none; color: #333; }
    button { padding: 10px 20px; background-color: #fbbc04; color: #000; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #f9a800; }

    /* weather result card - hidden until a city is found */
    .card { background-color: #1558b0; border: 1px solid #aac8f5; padding: 20px 30px; width: 100%; max-width: 480px; text-align: center; display: none; margin-bottom: 20px; }
    .card.show { display: block; }
    .card h2   { font-size: 1.4rem; margin-bottom: 4px; }
    .condition { font-size: 1rem; opacity: 0.85; margin-bottom: 20px; }
    .stats     { display: flex; justify-content: space-around; }
    .stat span { display: block; font-size: 1.4rem; font-weight: bold; }
    .stat label { font-size: 0.8rem; opacity: 0.75; margin-top: 4px; }

    /* error message shown when city is not in the list -->
    .error { background-color: #c0392b; padding: 12px 24px; display: none; margin-bottom: 16px; }
    .error.show { display: block; }

    /* all cities table scrolls if the screen is short */
    .all-cities { width: 100%; max-width: 700px; flex: 1; overflow: auto; }
    .all-cities h3 { margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; background-color: #1558b0; }
    th { background-color: #0d47a1; padding: 10px; text-align: left; font-size: 0.9rem; }
    td { padding: 9px 10px; border-bottom: 1px solid #4a90d9; font-size: 0.9rem; }
    tr:hover td { background-color: #1a73e8; }
  </style>
</head>
<body>
<div class="page">

  <h1><i class="fa fa-cloud-sun"></i> Weather Forecast</h1>
  <p class="sub">Type a city name to get current weather conditions</p>

  <!-- search box - also works with the Enter key -->
  <div class="search-box">
    <input type="text" id="cityInput" placeholder="e.g. Lagos, Abuja, Kano...">
    <button onclick="search()">Search</button>
  </div>

  <!-- this card shows up when a city is found -->
  <div class="card" id="card">
    <h2 id="cityName"></h2>
    <p class="condition" id="condition"></p>
    <div class="stats">
      <div class="stat"><span id="temp"></span><label>Temperature</label></div>
      <div class="stat"><span id="humidity"></span><label>Humidity</label></div>
      <div class="stat"><span id="wind"></span><label>Wind Speed</label></div>
    </div>
  </div>

  <!-- shown when the typed city is not in the XML -->
  <div class="error" id="error">
    <i class="fa fa-circle-xmark"></i> City not found. Try: Lagos, Abuja, Kano, Port Harcourt, Ibadan, Enugu, Kaduna
  </div>

  <!-- full list of all cities at the bottom -->
  <div class="all-cities">
    <h3><i class="fa fa-globe"></i> All Cities</h3>
    <table>
      <thead>
        <tr><th>City</th><th>Temp</th><th>Humidity</th><th>Wind</th><th>Condition</th></tr>
      </thead>
      <tbody id="allCities"></tbody>
    </table>
  </div>

</div>

<script>
  // stores all city data keyed by lowercase city name for easy lookup
  let cityData = {};

  // load the XML file and build the cityData object and the table
  fetch("weather.xml")
    .then(r => r.text())
    .then(xmlText => {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");
      const cities = xml.querySelectorAll("city");
      const tbody = document.getElementById("allCities");

      cities.forEach(c => {
        const name = c.getAttribute("name");

        // store each city's data so we can look it up quickly later
        cityData[name.toLowerCase()] = {
          name,
          temp:      c.querySelector("temperature").textContent + c.querySelector("temperature").getAttribute("unit"),
          humidity:  c.querySelector("humidity").textContent    + c.querySelector("humidity").getAttribute("unit"),
          wind:      c.querySelector("windspeed").textContent   + c.querySelector("windspeed").getAttribute("unit"),
          condition: c.querySelector("condition").textContent
        };

        // add a row to the all-cities table
        const d = cityData[name.toLowerCase()];
        tbody.innerHTML += `
          <tr>
            <td>${name}</td>
            <td>${d.temp}</td>
            <td>${d.humidity}</td>
            <td>${d.wind}</td>
            <td>${d.condition}</td>
          </tr>
        `;
      });
    });

  // runs when the Search button is clicked
  function search() {
    const key   = document.getElementById("cityInput").value.trim().toLowerCase();
    const card  = document.getElementById("card");
    const error = document.getElementById("error");

    if (cityData[key]) {
      // city found - fill in the card and show it
      const d = cityData[key];
      document.getElementById("cityName").textContent  = d.name;
      document.getElementById("condition").textContent = d.condition;
      document.getElementById("temp").textContent      = d.temp;
      document.getElementById("humidity").textContent  = d.humidity;
      document.getElementById("wind").textContent      = d.wind;
      card.classList.add("show");
      error.classList.remove("show");
    } else {
      // city not found - hide the card and show the error
      card.classList.remove("show");
      error.classList.add("show");
    }
  }

  // let the user press Enter instead of clicking the button
  document.getElementById("cityInput")
    .addEventListener("keydown", e => e.key === "Enter" && search());
</script>
</body>
</html>
