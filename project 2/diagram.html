<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Catalog – JSON Diagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #eee; padding: 40px 20px; }
    h1 { text-align: center; color: #e50914; margin-bottom: 6px; }
    p.sub { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.9rem; }

    svg { display: block; margin: 0 auto; overflow: visible; }

    .legend { max-width: 500px; margin: 40px auto 0; background: #1a1a1a; border-radius: 10px; padding: 20px; border: 1px solid #333; }
    .legend h3 { color: #e50914; margin-bottom: 12px; }
    .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; color: #ccc; }
    .legend-box { width: 24px; height: 18px; border-radius: 4px; flex-shrink: 0; }
  </style>
</head>
<body>

  <h1>🎬 Movie Catalog — JSON Structure</h1>
  <p class="sub">How the data is organised in <code>movies.json</code></p>

  <svg width="660" height="380" viewBox="0 0 660 380">

    <!-- root -> movies array -->
    <line x1="330" y1="42" x2="330" y2="90" stroke="#e50914" stroke-width="2"/>
    <!-- movies array -> movie object -->
    <line x1="330" y1="122" x2="330" y2="170" stroke="#e50914" stroke-width="2"/>
    <!-- movie object -> horizontal bar -->
    <line x1="330" y1="202" x2="330" y2="230" stroke="#e50914" stroke-width="2"/>

    <!-- horizontal bar -->
    <line x1="80" y1="230" x2="580" y2="230" stroke="#e50914" stroke-width="2"/>

    <!-- bar -> each field -->
    <line x1="80"  y1="230" x2="80"  y2="270" stroke="#e50914" stroke-width="2"/>
    <line x1="247" y1="230" x2="247" y2="270" stroke="#e50914" stroke-width="2"/>
    <line x1="413" y1="230" x2="413" y2="270" stroke="#e50914" stroke-width="2"/>
    <line x1="580" y1="230" x2="580" y2="270" stroke="#e50914" stroke-width="2"/>

    <!-- field -> value -->
    <line x1="80"  y1="302" x2="80"  y2="330" stroke="#e50914" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="247" y1="302" x2="247" y2="330" stroke="#e50914" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="413" y1="302" x2="413" y2="330" stroke="#e50914" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="580" y1="302" x2="580" y2="330" stroke="#e50914" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- ROOT object -->
    <rect x="210" y="10" width="240" height="32" rx="8" fill="#e50914"/>
    <text x="330" y="31" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">{ } Root Object</text>

    <!-- movies array -->
    <rect x="160" y="90" width="340" height="32" rx="8" fill="#b00610"/>
    <text x="330" y="111" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">"movies": [ ]  Array ×6 items</text>

    <!-- movie object -->
    <rect x="185" y="170" width="290" height="32" rx="8" fill="#b00610"/>
    <text x="330" y="191" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">{ } Movie Object</text>

    <!-- title -->
    <rect x="18" y="270" width="124" height="32" rx="8" fill="#1a1a1a" stroke="#e50914" stroke-width="2"/>
    <text x="80" y="291" text-anchor="middle" fill="#eee" font-size="13" font-family="Arial">"title"</text>

    <!-- genre -->
    <rect x="185" y="270" width="124" height="32" rx="8" fill="#1a1a1a" stroke="#e50914" stroke-width="2"/>
    <text x="247" y="291" text-anchor="middle" fill="#eee" font-size="13" font-family="Arial">"genre"</text>

    <!-- year -->
    <rect x="351" y="270" width="124" height="32" rx="8" fill="#1a1a1a" stroke="#e50914" stroke-width="2"/>
    <text x="413" y="291" text-anchor="middle" fill="#eee" font-size="13" font-family="Arial">"year"</text>

    <!-- rating -->
    <rect x="518" y="270" width="124" height="32" rx="8" fill="#1a1a1a" stroke="#e50914" stroke-width="2"/>
    <text x="580" y="291" text-anchor="middle" fill="#eee" font-size="13" font-family="Arial">"rating"</text>

    <!-- title value -->
    <rect x="10" y="330" width="140" height="32" rx="8" fill="#2a2a2a" stroke="#e50914" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="80" y="351" text-anchor="middle" fill="#f5c518" font-size="11" font-family="Arial">"King of Boys"</text>

    <!-- genre value -->
    <rect x="185" y="330" width="124" height="32" rx="8" fill="#2a2a2a" stroke="#e50914" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="247" y="351" text-anchor="middle" fill="#f5c518" font-size="11" font-family="Arial">"Thriller"</text>

    <!-- year value -->
    <rect x="363" y="330" width="100" height="32" rx="8" fill="#2a2a2a" stroke="#e50914" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="413" y="351" text-anchor="middle" fill="#f5c518" font-size="11" font-family="Arial">2018</text>

    <!-- rating value -->
    <rect x="530" y="330" width="100" height="32" rx="8" fill="#2a2a2a" stroke="#e50914" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="580" y="351" text-anchor="middle" fill="#f5c518" font-size="11" font-family="Arial">8.5</text>
  </svg>

  <div class="legend">
    <h3>🔑 Legend</h3>
    <div class="legend-item"><div class="legend-box" style="background:#e50914;"></div> Root object — the whole JSON file</div>
    <div class="legend-item"><div class="legend-box" style="background:#b00610;"></div> Array / Object — groups the movie items</div>
    <div class="legend-item"><div class="legend-box" style="background:#1a1a1a; border:2px solid #e50914;"></div> Key — a field name inside each movie</div>
    <div class="legend-item"><div class="legend-box" style="background:#2a2a2a; border:1px dashed #e50914;"></div> Example value stored for that key</div>
  </div>

</body>
</html>
