<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Catalog – JSON Diagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: Arial, sans-serif; background: #0f0f0f; color: #eee; overflow: hidden; }

    .page { height: 100vh; display: flex; flex-direction: column; padding: 16px 20px 12px; }

    h1 { text-align: center; color: #e50914; font-size: 1.2rem; margin-bottom: 2px; }
    p.sub { text-align: center; color: #888; font-size: 0.78rem; margin-bottom: 10px; }

    .tree-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .tree { display: flex; flex-direction: column; align-items: center; transform-origin: top center; }

    .node { padding: 5px 14px; border-radius: 6px; font-family: monospace; font-size: 0.78rem; font-weight: bold; white-space: nowrap; }
    .root { background: #e50914; color: #fff; }
    .lvl1 { background: #b00610; color: #fff; }
    .lvl2 { background: #1a1a1a; color: #eee; border: 2px solid #e50914; font-weight: normal; }
    .val  { background: #2a2a2a; color: #f5c518; border: 1px dashed #e50914; font-weight: normal; font-size: 0.72rem; }

    .v-line { width: 2px; height: 20px; background: #e50914; margin: 0 auto; }
    .v-dash { width: 2px; height: 20px; background: repeating-linear-gradient(to bottom,#e50914 0,#e50914 4px,transparent 4px,transparent 7px); margin: 0 auto; }

    .children { display: flex; align-items: flex-start; justify-content: center; position: relative; }
    .children::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: #e50914; }

    .branch { display: flex; flex-direction: column; align-items: center; padding: 0 14px; }
    .drop { width: 2px; height: 20px; background: #e50914; }

    .legend { display: flex; flex-wrap: wrap; gap: 6px 20px; justify-content: center; padding: 8px 10px; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: #ccc; }
    .lbox { width: 18px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="page">

  <h1>🎬 Movie Catalog — JSON Structure</h1>
  <p class="sub">How the data is organised in <code>movies.json</code></p>

  <div class="tree-wrap">
    <div class="tree">

      <div class="node root">{ } Root Object</div>
      <div class="v-line"></div>

      <div class="node lvl1">"movies" : [ ] — array of 6 movie objects</div>
      <div class="v-line"></div>

      <div class="node lvl1">{ } Movie Object — repeats 6 times</div>
      <div class="v-line"></div>

      <div class="children">

        <div class="branch">
          <div class="drop"></div>
          <div class="node lvl2">"title"</div>
          <div class="v-dash"></div>
          <div class="node val">"King of Boys"</div>
        </div>

        <div class="branch">
          <div class="drop"></div>
          <div class="node lvl2">"genre"</div>
          <div class="v-dash"></div>
          <div class="node val">"Thriller"</div>
        </div>

        <div class="branch">
          <div class="drop"></div>
          <div class="node lvl2">"year"</div>
          <div class="v-dash"></div>
          <div class="node val">2018</div>
        </div>

        <div class="branch">
          <div class="drop"></div>
          <div class="node lvl2">"rating"</div>
          <div class="v-dash"></div>
          <div class="node val">8.5</div>
        </div>

      </div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="lbox" style="background:#e50914;"></div> Root object</div>
    <div class="legend-item"><div class="lbox" style="background:#b00610;"></div> Array / Object</div>
    <div class="legend-item"><div class="lbox" style="background:#1a1a1a;border:2px solid #e50914;"></div> Key (field name)</div>
    <div class="legend-item"><div class="lbox" style="background:#2a2a2a;border:1px dashed #e50914;"></div> Example value</div>
  </div>

</div>
<script>
  function fitTree() {
    const wrap = document.querySelector('.tree-wrap');
    const tree = document.querySelector('.tree');
    tree.style.transform = 'scale(1)';
    const scale = Math.min(wrap.clientWidth / tree.scrollWidth, wrap.clientHeight / tree.scrollHeight, 1);
    tree.style.transform = `scale(${scale})`;
  }
  fitTree();
  window.addEventListener('resize', fitTree);
</script>
</body>
</html>
