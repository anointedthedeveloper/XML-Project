<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Catalog</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: Arial, sans-serif; background-color: #0f0f0f; color: #eee; overflow: hidden; }

    .page { height: 100vh; display: flex; flex-direction: column; padding: 24px 40px 20px; }

    h1   { color: #e50914; font-size: 1.6rem; margin-bottom: 16px; }
    h1 i { margin-right: 10px; }

    /* search and genre filter sit side by side */
    .controls { display: flex; gap: 10px; margin-bottom: 16px; }
    input, select {
      padding: 10px 12px; border: 1px solid #333;
      background-color: #1a1a1a; color: #eee;
      font-size: 1rem; flex: 1; outline: none;
    }

    /* table scrolls if there are lots of movies */
    .table-wrap { flex: 1; overflow: auto; }

    table { width: 100%; border-collapse: collapse; }
    th    { background-color: #e50914; color: #fff; padding: 12px 10px; text-align: left; font-size: 1rem; }
    td    { padding: 10px; border-bottom: 1px solid #2a2a2a; font-size: 0.95rem; }
    tr:hover td { background-color: #1a1a1a; }
    .stars { color: #f5c518; }
    #message { color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
<div class="page">

  <h1><i class="fa fa-film"></i> Movie Catalog</h1>

  <!-- search by title or pick a genre from the dropdown -->
  <div class="controls">
    <input type="text" id="search" placeholder="Search title..." oninput="filter()">
    <select id="genre" onchange="filter()">
      <option value="">All Genres</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Genre</th>
          <th>Year</th>
          <th>Rating</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <p id="message"></p>
  </div>

</div>

<script>
  // all movies loaded from the JSON file
  let movies = [];

  // load the JSON file when the page opens
  fetch("movies.json")
    .then(r => r.json())
    .then(data => {
      movies = data.movies;

      // fill the genre dropdown with unique genres from the data
      const genres = [...new Set(movies.map(m => m.genre))].sort();
      genres.forEach(g => {
        const opt = document.createElement("option");
        opt.value = opt.textContent = g;
        document.getElementById("genre").appendChild(opt);
      });

      render(movies);
    });

  // draws the table - sorted by rating highest first
  function render(list) {
    document.getElementById("tbody").innerHTML = list
      .sort((a, b) => b.rating - a.rating)
      .map(m => `
        <tr>
          <td>${m.title}</td>
          <td>${m.genre}</td>
          <td>${m.year}</td>
          <td><span class="stars"><i class="fa fa-star"></i></span> ${m.rating.toFixed(1)}</td>
        </tr>
      `).join("");

    document.getElementById("message").textContent = list.length === 0 ? "No movies found." : "";
  }

  // filters by title text and selected genre at the same time
  function filter() {
    const q = document.getElementById("search").value.toLowerCase();
    const g = document.getElementById("genre").value;
    render(movies.filter(m =>
      m.title.toLowerCase().includes(q) && (g === "" || m.genre === g)
    ));
  }
</script>
</body>
</html>
