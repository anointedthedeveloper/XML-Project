<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Address Book – XML Diagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: Arial, sans-serif; background: #f0f7ff; overflow: hidden; }

    .page { height: 100vh; display: flex; flex-direction: column; padding: 16px 20px 12px; }

    h1 { text-align: center; color: #1a56a0; font-size: 1.2rem; margin-bottom: 2px; }
    p.sub { text-align: center; color: #666; font-size: 0.78rem; margin-bottom: 10px; }

    .tree-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .tree { display: flex; flex-direction: column; align-items: center; transform-origin: top center; }

    .node { padding: 10px 22px; border-radius: 8px; font-family: monospace; font-size: 1.1rem; font-weight: bold; white-space: nowrap; }
    .root { background: #1a56a0; color: #fff; }
    .lvl1 { background: #4a90d9; color: #fff; }
    .lvl2 { background: #fff; color: #333; border: 2px solid #4a90d9; font-weight: normal; }
    .val  { background: #e8f4ff; color: #1a56a0; border: 1px dashed #4a90d9; font-weight: normal; font-size: 1rem; }

    .v-line { width: 2px; height: 20px; background-color: #4a90d9; margin: 0 auto; }
    .v-dash { width: 0; height: 20px; border-left: 2px dashed #4a90d9; margin: 0 auto; }

    .children { display: flex; align-items: flex-start; justify-content: center; position: relative; }
    .children::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background-color: #4a90d9; }

    .branch { display: flex; flex-direction: column; align-items: center; padding: 0 14px; }
    .drop { width: 2px; height: 20px; background-color: #4a90d9; }

    .legend { display: flex; flex-wrap: wrap; gap: 6px 20px; justify-content: center; padding: 8px 10px; background: #fff; border-radius: 8px; border: 1px solid #dce8f5; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.95rem; color: #555; }
    .lbox { width: 22px; height: 16px; border-radius: 3px; flex-shrink: 0; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="page">

  <h1><i class="fa fa-address-book"></i> Address Book — XML Structure</h1>
  <p class="sub">How the data is organised in <code>contacts.xml</code></p>

  <div class="tree-wrap">
    <div class="tree">

      <div class="node root">&lt;addressbook&gt;</div>
      <div class="v-line"></div>

      <div class="node lvl1">&lt;contact&gt; — repeats 5 times</div>
      <div class="v-line"></div>

      <div class="children">

        <div class="branch">
          <div class="drop"></div>
          <div class="node lvl2">&lt;name&gt;</div>
          <div class="v-dash"></div>
          <div class="node val">Chukwuemeka Obi</div>
        </div>

        <div class="branch">
          <div class="drop"></div>
          <div class="node lvl2">&lt;phone&gt;</div>
          <div class="v-dash"></div>
          <div class="node val">+234-803-456-7890</div>
        </div>

        <div class="branch">
          <div class="drop"></div>
          <div class="node lvl2">&lt;email&gt;</div>
          <div class="v-dash"></div>
          <div class="node val">emeka.obi@gmail.com</div>
        </div>

      </div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="lbox" style="background:#1a56a0;"></div> <i class="fa fa-key"></i> Root — wraps everything</div>
    <div class="legend-item"><div class="lbox" style="background:#4a90d9;"></div> Repeating — one per contact (×5)</div>
    <div class="legend-item"><div class="lbox" style="background:#fff;border:2px solid #4a90d9;"></div> Child element</div>
    <div class="legend-item"><div class="lbox" style="background:#e8f4ff;border:1px dashed #4a90d9;"></div> Example value</div>
  </div>

</div>
<script>
  function fitTree() {
    const wrap = document.querySelector('.tree-wrap');
    const tree = document.querySelector('.tree');
    tree.style.transform = 'scale(1)';
    const scale = Math.min(wrap.clientWidth / tree.scrollWidth, wrap.clientHeight / tree.scrollHeight, 1);
    tree.style.transform = `scale(${scale})`;
  }
  fitTree();
  window.addEventListener('resize', fitTree);
</script>
</body>
</html>
