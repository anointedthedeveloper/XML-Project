<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Address Book – XML Diagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f7ff; padding: 40px 20px; }
    h1 { text-align: center; color: #1a56a0; margin-bottom: 6px; }
    p.sub { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9rem; }

    svg { display: block; margin: 0 auto; overflow: visible; }

    .legend { max-width: 500px; margin: 40px auto 0; background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #dce8f5; }
    .legend h3 { color: #1a56a0; margin-bottom: 12px; }
    .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; }
    .legend-box { width: 24px; height: 18px; border-radius: 4px; flex-shrink: 0; }
  </style>
</head>
<body>

  <h1>📒 Address Book — XML Structure</h1>
  <p class="sub">How the data is organised in <code>contacts.xml</code></p>

  <svg width="600" height="340" viewBox="0 0 600 340">
    <!-- Lines first so nodes render on top -->

    <!-- root -> contact -->
    <line x1="300" y1="52" x2="300" y2="100" stroke="#4a90d9" stroke-width="2"/>

    <!-- contact -> horizontal bar -->
    <line x1="300" y1="132" x2="300" y2="160" stroke="#4a90d9" stroke-width="2"/>
    <!-- horizontal bar -->
    <line x1="100" y1="160" x2="500" y2="160" stroke="#4a90d9" stroke-width="2"/>
    <!-- bar -> name -->
    <line x1="100" y1="160" x2="100" y2="200" stroke="#4a90d9" stroke-width="2"/>
    <!-- bar -> phone -->
    <line x1="300" y1="160" x2="300" y2="200" stroke="#4a90d9" stroke-width="2"/>
    <!-- bar -> email -->
    <line x1="500" y1="160" x2="500" y2="200" stroke="#4a90d9" stroke-width="2"/>

    <!-- name -> value -->
    <line x1="100" y1="232" x2="100" y2="270" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- phone -> value -->
    <line x1="300" y1="232" x2="300" y2="270" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- email -> value -->
    <line x1="500" y1="232" x2="500" y2="270" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- ROOT node -->
    <rect x="190" y="10" width="220" height="42" rx="8" fill="#1a56a0"/>
    <text x="300" y="36" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="Arial">&lt;addressbook&gt;</text>

    <!-- contact node -->
    <rect x="170" y="100" width="260" height="32" rx="8" fill="#4a90d9"/>
    <text x="300" y="121" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">&lt;contact&gt;  ×5</text>

    <!-- name node -->
    <rect x="30" y="200" width="140" height="32" rx="8" fill="white" stroke="#4a90d9" stroke-width="2"/>
    <text x="100" y="221" text-anchor="middle" fill="#333" font-size="13" font-family="Arial">&lt;name&gt;</text>

    <!-- phone node -->
    <rect x="220" y="200" width="160" height="32" rx="8" fill="white" stroke="#4a90d9" stroke-width="2"/>
    <text x="300" y="221" text-anchor="middle" fill="#333" font-size="13" font-family="Arial">&lt;phone&gt;</text>

    <!-- email node -->
    <rect x="420" y="200" width="140" height="32" rx="8" fill="white" stroke="#4a90d9" stroke-width="2"/>
    <text x="500" y="221" text-anchor="middle" fill="#333" font-size="13" font-family="Arial">&lt;email&gt;</text>

    <!-- name value -->
    <rect x="18" y="270" width="164" height="32" rx="8" fill="#e8f4ff" stroke="#4a90d9" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="100" y="291" text-anchor="middle" fill="#1a56a0" font-size="11" font-family="Arial">Chukwuemeka Obi</text>

    <!-- phone value -->
    <rect x="200" y="270" width="200" height="32" rx="8" fill="#e8f4ff" stroke="#4a90d9" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="300" y="291" text-anchor="middle" fill="#1a56a0" font-size="11" font-family="Arial">+234-803-456-7890</text>

    <!-- email value -->
    <rect x="408" y="270" width="184" height="32" rx="8" fill="#e8f4ff" stroke="#4a90d9" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="500" y="291" text-anchor="middle" fill="#1a56a0" font-size="11" font-family="Arial">emeka.obi@gmail.com</text>
  </svg>

  <div class="legend">
    <h3>🔑 Legend</h3>
    <div class="legend-item"><div class="legend-box" style="background:#1a56a0;"></div> Root element — wraps everything</div>
    <div class="legend-item"><div class="legend-box" style="background:#4a90d9;"></div> Repeating element — one per contact (×5)</div>
    <div class="legend-item"><div class="legend-box" style="background:#fff; border:2px solid #4a90d9;"></div> Child element — holds one piece of data</div>
    <div class="legend-item"><div class="legend-box" style="background:#e8f4ff; border:1px dashed #4a90d9;"></div> Example value stored inside the element</div>
  </div>

</body>
</html>
